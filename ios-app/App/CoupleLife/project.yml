name: CoupleLife
options:
  createIntermediateGroups: true
settings:
  base:
    # Use Xcode's default toolchain Swift version (required for SwiftData macros like `#Predicate`).
targets:
  CoupleLife:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CoupleLife
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ar1shadow.couplelife
        PRODUCT_NAME: CoupleLife
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: CoupleLife/CoupleLife.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSHealthShareUsageDescription: CoupleLife 仅会在你主动连接后读取步数与睡眠摘要，用于首页和运动页展示。
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: CoupleLife 当前不会写入你的健康数据。
    dependencies:
      - sdk: HealthKit.framework
    scheme:
      testTargets:
        - CoupleLifeTests
  CoupleLifeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CoupleLifeTests
    dependencies:
      - target: CoupleLife
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ar1shadow.couplelife.tests
        GENERATE_INFOPLIST_FILE: YES
